{% extends 'base.html' %}
{% block title %}Patient Profile - MediCare HMS{% endblock %}
{% block content %}
<div class="card">
    <div class="card-header py-3">
        <h5 class="mb-0"><i class="fas fa-user me-2 text-primary"></i>My Patient Profile</h5>
    </div>
    <div class="card-body p-4">
        <form method="post">
            {% csrf_token %}
            <div class="row">
                {% for field in form %}
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
                </div>
                {% endfor %}
            </div>
            <button type="submit" class="btn btn-primary"><i class="fas fa-save me-2"></i>Save Profile</button>
        </form>
    </div>
</div>
{% endblock %}
